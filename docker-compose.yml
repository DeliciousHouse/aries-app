services:
  aries-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ARIES_APP_IMAGE:-aries-app:local}
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      CODE_ROOT: /app
      DATA_ROOT: /data
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
      OPENCLAW_LOBSTER_CWD: ${OPENCLAW_LOBSTER_CWD:-lobster}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_BASE_URL: ${APP_BASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      META_REDIRECT_URI: ${META_REDIRECT_URI}
      LINKEDIN_REDIRECT_URI: ${LINKEDIN_REDIRECT_URI}
      TIKTOK_REDIRECT_URI: ${TIKTOK_REDIRECT_URI}
      X_REDIRECT_URI: ${X_REDIRECT_URI}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      MARKETING_STATUS_PUBLIC: ${MARKETING_STATUS_PUBLIC:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - aries_runtime_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docker_stack

networks:
  docker_stack:
    external: true
    name: docker-stack

volumes:
  aries_runtime_data:
