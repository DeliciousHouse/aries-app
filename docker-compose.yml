services:
  aries-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aries-app:local
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      CODE_ROOT: /app
      DATA_ROOT: /data
      N8N_BASE_URL: ${N8N_BASE_URL}
      N8N_API_KEY: ${N8N_API_KEY}
    volumes:
      - aries_runtime_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  aries_runtime_data:
