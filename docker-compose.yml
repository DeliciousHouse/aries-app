services:
  aries-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARIES_NODE_UID: 1004
        ARIES_NODE_GID: 1004
    image: ${ARIES_APP_IMAGE:-aries-app:local}
    environment:
      HOME: /home/node
      NODE_ENV: production
      PORT: ${PORT:-3000}
      CODE_ROOT: /app
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
      # DB_HOST points at the companion postgres service below, not at ${DB_HOST}
      # from .env. Compose owns service discovery; .env only holds credentials.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_BASE_URL: ${APP_BASE_URL}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      META_PAGE_ID: ${META_PAGE_ID}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      X_CLIENT_ID: ${X_CLIENT_ID}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      MARKETING_STATUS_PUBLIC: ${MARKETING_STATUS_PUBLIC:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      OPENCLAW_LOBSTER_CWD: ${OPENCLAW_LOBSTER_CWD:-/app/lobster}
      OPENCLAW_GATEWAY_LOBSTER_CWD: ${OPENCLAW_GATEWAY_LOBSTER_CWD:-lobster}
      OPENCLAW_LOCAL_LOBSTER_CWD: ${OPENCLAW_LOCAL_LOBSTER_CWD:-/app/lobster}
      # Lobster stage cache dirs. These MUST resolve to the same absolute paths
      # on the host (where OpenClaw/Lobster writes) and inside the container
      # (where Aries reads), so the routes live under the shared /data bind
      # mount. The host operator must export the matching LOBSTER_STAGE{N}_CACHE_DIR
      # pointing at ${ARIES_SHARED_DATA_ROOT}/lobster-stage{N}-cache BEFORE
      # starting OpenClaw; see DOCKER.md.
      LOBSTER_STAGE1_CACHE_DIR: ${LOBSTER_STAGE1_CACHE_DIR:-/data/lobster-stage1-cache}
      LOBSTER_STAGE2_CACHE_DIR: ${LOBSTER_STAGE2_CACHE_DIR:-/data/lobster-stage2-cache}
      LOBSTER_STAGE3_CACHE_DIR: ${LOBSTER_STAGE3_CACHE_DIR:-/data/lobster-stage3-cache}
      LOBSTER_STAGE4_CACHE_DIR: ${LOBSTER_STAGE4_CACHE_DIR:-/data/lobster-stage4-cache}
      # Host lobster/output mount is read by asset-ingest to copy generated
      # assets into DATA_ROOT at ingest time. Keep _DIR/_MOUNT in sync with
      # the bind mount below so asset-ingest can remap host paths.
      ARIES_LOBSTER_HOST_OUTPUT_DIR: ${ARIES_LOBSTER_HOST_OUTPUT_DIR:-/home/node/openclaw/aries-app/lobster/output}
      ARIES_LOBSTER_HOST_OUTPUT_MOUNT: ${ARIES_LOBSTER_HOST_OUTPUT_MOUNT:-/host-lobster-output}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ARIES_SHARED_DATA_ROOT:-/home/node/data}:/data
      - ${ARIES_LOBSTER_HOST_OUTPUT_DIR:-/home/node/openclaw/aries-app/lobster/output}:${ARIES_LOBSTER_HOST_OUTPUT_MOUNT:-/host-lobster-output}:ro
      - gh_config:/home/node/.config/gh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docker_stack
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - aries_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - docker_stack

networks:
  docker_stack:
    external: true
    name: docker-stack

volumes:
  gh_config:
    name: aries-app_gh_config
    external: true
  aries_pg_data:
    name: aries_pg_data
    
