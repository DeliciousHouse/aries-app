services:
  aries-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aries-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      N8N_BASE_URL: ${N8N_BASE_URL:-http://host.docker.internal:5678}
      N8N_API_KEY: ${N8N_API_KEY:-local_n8n_api_key_from_secret_store}
      PROJECT_ROOT: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
