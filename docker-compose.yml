services:
  aries-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARIES_NODE_UID: 1004
        ARIES_NODE_GID: 1004
    image: ${ARIES_APP_IMAGE:-aries-app:local}
    environment:
      HOME: /home/node
      NODE_ENV: production
      ARIES_PROCESS_MANAGER: ${ARIES_PROCESS_MANAGER:-cluster}
      ARIES_WEB_CONCURRENCY: ${ARIES_WEB_CONCURRENCY:-2}
      ARIES_WORKER_MAX_RESTARTS: ${ARIES_WORKER_MAX_RESTARTS:-5}
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0
      CODE_ROOT: /app
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ARIES_EXECUTION_PROVIDER: ${ARIES_EXECUTION_PROVIDER:-hermes}
      ARIES_MARKETING_EXECUTION_PROVIDER: ${ARIES_MARKETING_EXECUTION_PROVIDER:-hermes}
      # Migration gate for PR #302 stage-cache tenant-prefix work. Enables
      # READS from the legacy <cacheRoot>/<runId>/... layout during the
      # one-pipeline-cycle soak period. New writes always go to the
      # tenant-scoped path regardless. Remove after migration completes.
      ARIES_STAGE_CACHE_LEGACY_READ_FALLBACK: ${ARIES_STAGE_CACHE_LEGACY_READ_FALLBACK:-}
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:-}
      HERMES_API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-}
      HERMES_SESSION_KEY: ${HERMES_SESSION_KEY:-main}
      # Phase B three-profile routing — each marketing stage runs on its own
      # Hermes profile gateway, bound to its own port. The gateway URLs carry
      # the production cutover defaults; the per-profile API keys come from the
      # deployment environment (blank default), matching HERMES_API_SERVER_KEY.
      #   research   -> aries-research          (default gateway, port 8642 —
      #                 the aries-research gateway is 127.0.0.1-bound and not
      #                 container-reachable, so research stays on the default)
      #   strategy   -> aries-strategist        (port 8654)
      #   publish    -> aries-strategist        (port 8654)
      #   production -> aries-content-generator (port 8655)
      HERMES_RESEARCH_GATEWAY_URL: ${HERMES_RESEARCH_GATEWAY_URL:-}
      HERMES_RESEARCH_API_SERVER_KEY: ${HERMES_RESEARCH_API_SERVER_KEY:-}
      HERMES_STRATEGIST_GATEWAY_URL: ${HERMES_STRATEGIST_GATEWAY_URL:-http://host.docker.internal:8654}
      HERMES_STRATEGIST_API_SERVER_KEY: ${HERMES_STRATEGIST_API_SERVER_KEY:-}
      HERMES_CONTENT_GATEWAY_URL: ${HERMES_CONTENT_GATEWAY_URL:-http://host.docker.internal:8655}
      HERMES_CONTENT_API_SERVER_KEY: ${HERMES_CONTENT_API_SERVER_KEY:-}
      # 1200s (20 min): tuned to the actual production-stage cost on real
      # tenants. Observed end-to-end durations on aries.sugarandleather.com
      # one-off campaigns (mkt_3e04f5d1 production run on 2026-05-27):
      #   - research: ~2 min
      #   - strategy: ~1 min
      #   - production: 10 min 39 s (7 posts, 7 generated images)
      # The previous 600s budget fired 38 s BEFORE Hermes returned the
      # completed run for that campaign, recording a spurious
      # `hermes_gateway_timeout` failure even though the content package
      # (including all 7 cached image files) was sitting ready in Hermes.
      # The 120_000 code-default in backend/marketing/ports/hermes.ts is for
      # synthetic happy-path tests and is unsuitable for real tenants. This
      # compose value overrides the code default for the aries-app service
      # (the scheduled-posts-worker doesn't talk to Hermes directly so it
      # doesn't need this knob). Override via env if a tenant routinely runs
      # >20 min (e.g. video render workloads).
      HERMES_RUN_TIMEOUT_MS: ${HERMES_RUN_TIMEOUT_MS:-1200000}
      HERMES_POLL_INTERVAL_MS: ${HERMES_POLL_INTERVAL_MS:-}
      ARIES_REAPER_ENABLED: ${ARIES_REAPER_ENABLED:-1}
      ARIES_REAPER_INTERVAL_MS: ${ARIES_REAPER_INTERVAL_MS:-300000}
      ARIES_KANBAN_GC_ENABLED: ${ARIES_KANBAN_GC_ENABLED:-1}
      ARIES_KANBAN_GC_INTERVAL_MS: ${ARIES_KANBAN_GC_INTERVAL_MS:-86400000}
      ARIES_KANBAN_GC_RETENTION_DAYS: ${ARIES_KANBAN_GC_RETENTION_DAYS:-7}
      ARIES_AUTO_APPROVE_MARKETING_PIPELINE: ${ARIES_AUTO_APPROVE_MARKETING_PIPELINE:-1}
      ARIES_BRAND_ENRICHMENT_ENABLED: ${ARIES_BRAND_ENRICHMENT_ENABLED:-1}
      # 2026-05-23: flipped ON per TODOS rollout. Narrow first-name-denylist
      # heuristic replaces the legacy /[A-Z][a-z]+\s+[A-Z][a-z]+/ regex in
      # backend/memory/write-events.ts::scrubPreferenceLabelForHoncho. Effect:
      # creative descriptors like "Bold Minimalist" / "Quiet Luxury" stop
      # being scrubbed to [redacted_name], while real first+last name pairs
      # still get redacted. Email redaction unchanged. Tests:
      # tests/memory-label-redaction.test.ts cover both modes.
      ARIES_MEMORY_LABEL_REDACTION_V2: ${ARIES_MEMORY_LABEL_REDACTION_V2:-1}
      HERMES_BRAND_ANALYSIS_SESSION_KEY: ${HERMES_BRAND_ANALYSIS_SESSION_KEY:-}
      HERMES_BRAND_ANALYSIS_TIMEOUT_MS: ${HERMES_BRAND_ANALYSIS_TIMEOUT_MS:-}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_BASE_URL: ${APP_BASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      # 2026-05-24: flipped ON to ship Honcho continuous-profile-writes
      # Phases 1+2+3 per docs/plans/2026-05-11. Code for all three was
      # already on master; this flips the env defaults so the single-tenant
      # prod container starts writing. Each phase has its own gate so any
      # one can be killed without redeploy if a write surface misbehaves.
      # PREREQUISITES: production .env must have HONCHO_BASE_URL +
      # HONCHO_CONTROL_PLANE_JWT + HONCHO_DATA_PLANE_JWT +
      # ARIES_TENANT_PSEUDONYM_SALT set. If unset, writes silently no-op
      # per design ("Honcho unavailability must remain silent
      # degradation"). The honcho_write_idempotency_keys Postgres table
      # is in scripts/init-db.js:521.
      HONCHO_ENABLED: ${HONCHO_ENABLED:-true}
      HONCHO_WRITE_APPROVALS_ENABLED: ${HONCHO_WRITE_APPROVALS_ENABLED:-true}
      HONCHO_WRITE_PUBLISH_ENABLED: ${HONCHO_WRITE_PUBLISH_ENABLED:-true}
      HONCHO_WRITE_PREFERENCES_ENABLED: ${HONCHO_WRITE_PREFERENCES_ENABLED:-true}
      HONCHO_BASE_URL: ${HONCHO_BASE_URL:-}
      HONCHO_CONTROL_PLANE_JWT: ${HONCHO_CONTROL_PLANE_JWT:-}
      HONCHO_DATA_PLANE_JWT: ${HONCHO_DATA_PLANE_JWT:-}
      ARIES_TENANT_PSEUDONYM_SALT: ${ARIES_TENANT_PSEUDONYM_SALT:-}
      ARIES_RESEARCH_ENABLED: ${ARIES_RESEARCH_ENABLED:-0}
      ARIES_RESEARCH_MEMORY_TOKEN_BUDGET: ${ARIES_RESEARCH_MEMORY_TOKEN_BUDGET:-}
      HERMES_RESEARCH_WEBHOOK_URL: ${HERMES_RESEARCH_WEBHOOK_URL:-}
      HERMES_RESEARCH_AGENT_NAME: ${HERMES_RESEARCH_AGENT_NAME:-aries-research}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      META_PAGE_ID: ${META_PAGE_ID}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      X_CLIENT_ID: ${X_CLIENT_ID}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      MARKETING_STATUS_PUBLIC: ${MARKETING_STATUS_PUBLIC:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      PARTNER_ATTRIBUTION_ENABLED: ${PARTNER_ATTRIBUTION_ENABLED:-false}
      VMS_BASE_URL: ${VMS_BASE_URL:-http://vms-app:3000}
      VMS_WEBHOOK_SECRET: ${VMS_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      # Stage-cache lookup roots used by Aries artifact ingestion.
      ARTIFACT_PIPELINE_CWD: ${ARTIFACT_PIPELINE_CWD:-/app/hermes}
      ARTIFACT_PIPELINE_LOCAL_CWD: ${ARTIFACT_PIPELINE_LOCAL_CWD:-/app/hermes}
      # Marketing stage cache dirs. Aries reads generated stage artifacts from
      # these roots; keep them under the shared /data bind mount. See DOCKER.md.
      ARTIFACT_STAGE1_CACHE_DIR: ${ARTIFACT_STAGE1_CACHE_DIR:-/data/hermes-stage1-cache}
      ARTIFACT_STAGE2_CACHE_DIR: ${ARTIFACT_STAGE2_CACHE_DIR:-/data/hermes-stage2-cache}
      ARTIFACT_STAGE3_CACHE_DIR: ${ARTIFACT_STAGE3_CACHE_DIR:-/data/hermes-stage3-cache}
      ARTIFACT_STAGE4_CACHE_DIR: ${ARTIFACT_STAGE4_CACHE_DIR:-/data/hermes-stage4-cache}
      # Host artifact output mount: read by asset-ingest to copy generated
      # assets into DATA_ROOT at ingest time. Keep _DIR/_MOUNT in sync with
      # the bind mount below so asset-ingest can remap host paths.
      ARIES_HOST_ARTIFACT_OUTPUT_DIR: ${ARIES_HOST_ARTIFACT_OUTPUT_DIR:-/home/node/aries-app/hermes/output}
      ARIES_HOST_ARTIFACT_OUTPUT_MOUNT: ${ARIES_HOST_ARTIFACT_OUTPUT_MOUNT:-/hermes-output}
      # Hermes image cache mount: host path where Hermes writes generated images,
      # bind-mounted read-only into the container so /api/internal/hermes/media
      # can stream them to authenticated browser sessions and the production
      # callback can ingest creative_assets into the DB.
      #
      # NOTE: the three-profile Hermes routing (PR #390) moved generated images
      # out of the legacy <hermes>/cache/images into a profile-scoped directory,
      # <hermes>/profiles/aries-content-generator/cache/images. The bind-mount
      # below MUST point at the profile cache or the marketing pipeline's images
      # are unreadable from the container — publish ingestion silently produces
      # zero creative_assets and the operator dashboard shows "No launch items".
      HERMES_IMAGE_CACHE_MOUNT: ${HERMES_IMAGE_CACHE_MOUNT:-/hermes-media}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ARIES_SHARED_DATA_ROOT:-/home/node/data}:/data
      - ${ARIES_HOST_ARTIFACT_OUTPUT_DIR:-/home/node/aries-app/hermes/output}:${ARIES_HOST_ARTIFACT_OUTPUT_MOUNT:-/hermes-output}:ro
      - ${HERMES_IMAGE_CACHE_DIR:-/home/node/.hermes/profiles/aries-content-generator/cache/images}:/hermes-media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docker_stack
  # Long-lived sidecar that drains the scheduled_posts table and POSTs due rows
  # to /api/internal/publishing/scheduled-dispatch every 60 seconds. The worker
  # script self-schedules via setInterval when started without
  # ARIES_SCHEDULED_POSTS_RUN_ONCE, so this service just keeps that process up;
  # single replica avoids racing the SQL claim-lock on the same row.
  aries-scheduled-posts-worker:
    image: ${ARIES_APP_IMAGE:-aries-app:local}
    command: ["node", "scripts/automations/scheduled-posts-worker.mjs"]
    depends_on:
      aries-app:
        condition: service_healthy
    environment:
      HOME: /home/node
      NODE_ENV: production
      CODE_ROOT: /app
      DATA_ROOT: /data
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_POOL_MAX: 3
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # Hit the in-network app, not the public URL — avoids a public DNS + TLS
      # round-trip on every tick. The /api/internal/publishing/scheduled-dispatch
      # route authenticates on INTERNAL_API_SECRET, not on host.
      APP_BASE_URL: http://aries-app:${PORT:-3000}
      NEXTAUTH_URL: http://aries-app:${PORT:-3000}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    restart: unless-stopped
    networks:
      - docker_stack
networks:
  docker_stack:
    external: true
    name: docker-stack

