services:
  aries-app:
    image: ${ARIES_APP_IMAGE:?Set ARIES_APP_IMAGE to a root-built Aries image tag}
    environment:
      HOME: /home/node
      GH_CONFIG_DIR: /home/node/.config/gh
      NODE_ENV: production
      PORT: ${PORT:-3000}
      CODE_ROOT: /app
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_BASE_URL: ${APP_BASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      META_REDIRECT_URI: ${META_REDIRECT_URI}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      META_PAGE_ID: ${META_PAGE_ID}
      LINKEDIN_REDIRECT_URI: ${LINKEDIN_REDIRECT_URI}
      TIKTOK_REDIRECT_URI: ${TIKTOK_REDIRECT_URI}
      X_REDIRECT_URI: ${X_REDIRECT_URI}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      MARKETING_STATUS_PUBLIC: ${MARKETING_STATUS_PUBLIC:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY:-}
      OPENCLAW_LOBSTER_CWD: ${OPENCLAW_LOBSTER_CWD:-/app/lobster}
      OPENCLAW_GATEWAY_LOBSTER_CWD: ${OPENCLAW_GATEWAY_LOBSTER_CWD:-aries-app/lobster}
      OPENCLAW_LOCAL_LOBSTER_CWD: ${OPENCLAW_LOCAL_LOBSTER_CWD:-/app/lobster}
    volumes:
      - aries_runtime_data:/data
      - gh_config:/home/node/.config/gh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docker_stack

  mission-control:
    image: node:24
    user: "${ARIES_NODE_UID:-1004}:${ARIES_NODE_GID:-1004}"
    working_dir: /app/mission-control
    environment:
      HOME: /home/node
      GH_CONFIG_DIR: /home/node/.config/gh
      NPM_CONFIG_CACHE: /tmp/.npm
    command: sh -lc "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4174"
    volumes:
      - /home/node/openclaw/projects/mission-control-builder/mission-control:/app/mission-control
      - /home/node/openclaw/aries-app:/app/aries-app:ro
      - gh_config:/home/node/.config/gh
    ports:
      - "4174:4174"
    restart: unless-stopped
    networks:
      - docker_stack

networks:
  docker_stack:
    external: true
    name: docker-stack

volumes:
  aries_runtime_data:
    name: aries-app_aries_runtime_data
  gh_config:
    name: aries-app_gh_config
