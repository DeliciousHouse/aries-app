name: Deploy

# Operational contract (documented in DOCKER.md and docs/SYSTEM-REFERENCE.md):
# - Pushes to master build/publish and deploy the exact merge commit SHA.
# - Agent automerge uses GITHUB_TOKEN, so its merge push does not trigger push workflows;
#   pr-agent-autofix-automerge dispatches this workflow manually with image_tag/git_ref
#   pinned to the merge SHA.
# - Manual workflow_dispatch deploys accept an explicit image_tag (SHA or other tag).
# - If package linkage/permissions are not ready for GITHUB_TOKEN, set GHCR_WORKFLOW_TOKEN.

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to deploy
        required: true
        type: string
      git_ref:
        description: Optional git ref to check out on the deploy host
        required: false
        type: string

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aries-app
  STATIC_PUSH_BRANCH: master
  DEFAULT_BRANCH: ${{ vars.DEFAULT_BRANCH }}
  DEPLOY_PATH: /home/node/aries-app
  SERVICE_NAME: aries-app

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Validate branch wiring
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${DEFAULT_BRANCH}" ]]; then
            echo "ERROR: Repository variable DEFAULT_BRANCH must be set." >&2
            exit 1
          fi
          if [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ "${STATIC_PUSH_BRANCH}" != "${DEFAULT_BRANCH}" ]]; then
              echo "ERROR: Workflow push branch (${STATIC_PUSH_BRANCH}) does not match DEFAULT_BRANCH (${DEFAULT_BRANCH})." >&2
              exit 1
            fi
            if [[ "${REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
              echo "ERROR: Push deploy received ${REF_NAME}, expected ${DEFAULT_BRANCH}." >&2
              exit 1
            fi
          fi

      - name: Resolve deploy target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_GIT_REF: ${{ inputs.git_ref }}
          CURRENT_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # GHCR image paths must be lowercase; github.repository_owner preserves org casing (e.g. DeliciousHouse).
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"

          if [[ "${EVENT_NAME}" == "push" ]]; then
            image_tag="${CURRENT_SHA}"
            checkout_ref="${CURRENT_SHA}"
          else
            image_tag="${INPUT_IMAGE_TAG}"
            if [[ -z "${image_tag}" ]]; then
              echo "ERROR: image_tag is required for manual deploys." >&2
              exit 1
            fi
            if [[ -n "${INPUT_GIT_REF}" ]]; then
              checkout_ref="${INPUT_GIT_REF}"
            elif [[ "${image_tag}" =~ ^[0-9a-f]{40}$ ]]; then
              checkout_ref="${image_tag}"
            else
              echo "ERROR: Manual deploys require git_ref unless image_tag is a full commit SHA." >&2
              exit 1
            fi
          fi

          image_ref="${REGISTRY}/${owner_lc}/${IMAGE_NAME}:${image_tag}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_WORKFLOW_TOKEN || github.token }}

      - name: Checkout deploy source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish exact deploy image
        env:
          TARGET_IMAGE_TAG: ${{ steps.resolve.outputs.image_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          if [[ ! "${TARGET_IMAGE_TAG}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Skipping image publish for non-SHA tag ${TARGET_IMAGE_TAG}; assuming it already exists."
            exit 0
          fi

          checkout_sha="$(git rev-parse HEAD)"
          if [[ "${checkout_sha}" != "${TARGET_IMAGE_TAG}" ]]; then
            echo "ERROR: Ref checkout ${checkout_sha} does not match target image tag ${TARGET_IMAGE_TAG}." >&2
            exit 1
          fi

          ./scripts/release/publish-image.sh

      - name: Deploy on host
        env:
          TARGET_IMAGE: ${{ steps.resolve.outputs.image_ref }}
          TARGET_CHECKOUT_REF: ${{ steps.resolve.outputs.checkout_ref }}
          WORKFLOW_GIT_TOKEN: ${{ secrets.GHCR_WORKFLOW_TOKEN || github.token }}
        run: |
          set -euo pipefail
          repo_path="${DEPLOY_PATH}"
          origin_url="https://x-access-token:${WORKFLOW_GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [[ ! -d "${repo_path}/.git" ]]; then
            echo "ERROR: DEPLOY_PATH must point at the persistent deploy checkout (missing .git): ${repo_path}" >&2
            exit 1
          fi

          # Deploy contract: the deploy-host repo checkout is a build artifact,
          # NOT an authoring surface. Every deploy hard-syncs the working tree
          # to the target ref. Any tracked file edited in place on the host will be
          # destroyed; commit changes upstream instead. Any untracked state that
          # must survive (e.g. .deploy-backups/, data/generated/, node_modules/)
          # must be gitignored — `git clean -fd` without -x leaves ignored
          # files alone.
          #
          # Historically this step used a stash / preserve-untracked / pop
          # dance that tried to merge host-local state back on top of the
          # checkout. That dance failed whenever cron-written files (the ones
          # now gitignored) collided with origin, leaving orphaned stashes and
          # a wedged working tree that blocked every subsequent deploy. The
          # simpler hard-sync flow below is deliberately destructive and
          # idempotent so a dirty deploy host never jams future deploys.

          resolve_checkout_target() {
            local requested="$1"
            case "${requested}" in
              refs/heads/*)
                echo "origin/${requested#refs/heads/}"
                return 0
                ;;
              refs/tags/*)
                echo "${requested#refs/tags/}"
                return 0
                ;;
            esac

            if git -C "${repo_path}" rev-parse --verify --quiet "origin/${requested}^{commit}" >/dev/null; then
              echo "origin/${requested}"
              return 0
            fi

            if git -C "${repo_path}" rev-parse --verify --quiet "${requested}^{commit}" >/dev/null; then
              echo "${requested}"
              return 0
            fi

            echo "ERROR: Unable to resolve checkout ref ${requested}" >&2
            exit 1
          }

          git -C "${repo_path}" fetch --prune --tags "${origin_url}" \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'
          checkout_target="$(resolve_checkout_target "${TARGET_CHECKOUT_REF}")"

          # Destructive hard-sync. `reset --hard` forces HEAD + index + worktree
          # to match the target ref regardless of prior state (unmerged entries,
          # aborted merges, dirty tracked files). `clean -fd` (no -x) removes
          # untracked files + directories but leaves gitignored runtime state
          # (data/generated/, node_modules/, .deploy-backups/, etc.) intact.
          # .deploy-backups/ is explicitly excluded so any prior collision
          # archives remain for manual reconciliation.
          git -C "${repo_path}" reset --hard "${checkout_target}"
          git -C "${repo_path}" clean -fd --exclude=.deploy-backups

          cd "${repo_path}"
          ARIES_APP_IMAGE="${TARGET_IMAGE}" docker compose pull "${SERVICE_NAME}"
          ARIES_APP_IMAGE="${TARGET_IMAGE}" docker compose up -d --no-deps --force-recreate --pull always "${SERVICE_NAME}"

          container_id="$(ARIES_APP_IMAGE="${TARGET_IMAGE}" docker compose ps -q "${SERVICE_NAME}")"
          if [[ -z "${container_id}" ]]; then
            echo "ERROR: Compose did not return a running container id for ${SERVICE_NAME}." >&2
            exit 1
          fi
          target_image_id="$(docker image inspect -f '{{.Id}}' "${TARGET_IMAGE}")"
          container_image_id="$(docker inspect -f '{{.Image}}' "${container_id}")"
          if [[ "${container_image_id}" != "${target_image_id}" ]]; then
            echo "ERROR: Running container image ${container_image_id} does not match target ${target_image_id}." >&2
            exit 1
          fi

          healthy=0
          for attempt in $(seq 1 30); do
            if docker compose exec -T "${SERVICE_NAME}" wget -qO- "http://127.0.0.1:${PORT:-3000}/" >/dev/null 2>&1; then
              healthy=1
              break
            fi
            sleep 5
          done

          if [[ "${healthy}" != "1" ]]; then
            echo "ERROR: Aries app health check failed after deploy." >&2
            exit 1
          fi
