services:
  aries-app:
    # This block is a local-only override for the main aries-app service.
    # It does NOT create a second instance; Compose merges these fields into
    # the base aries-app definition from docker-compose.yml. Keep local URL
    # defaults here, while the production port publish stays in the base file
    # so deploys work even when only docker-compose.yml is used.
    environment:
      PORT: ${PORT:-3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      # Hermes image cache mount (dev parity with production docker-compose.yml).
      HERMES_IMAGE_CACHE_MOUNT: ${HERMES_IMAGE_CACHE_MOUNT:-/hermes-media}

  aries-app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      NODE_ENV: development
      HOME: /home/node
      PORT: ${PORT:-3000}
      CODE_ROOT: /app
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      META_PAGE_ID: ${META_PAGE_ID}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      X_CLIENT_ID: ${X_CLIENT_ID}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Stage-cache lookup roots used by Aries artifact ingestion.
      ARTIFACT_PIPELINE_CWD: ${ARTIFACT_PIPELINE_CWD:-/app/hermes}
      ARTIFACT_PIPELINE_LOCAL_CWD: ${ARTIFACT_PIPELINE_LOCAL_CWD:-/app/hermes}
      # Marketing stage cache dirs. The /data bind mount above shares
      # ${ARIES_SHARED_DATA_ROOT} with the host. See DOCKER.md.
      ARTIFACT_STAGE1_CACHE_DIR: ${ARTIFACT_STAGE1_CACHE_DIR:-/data/hermes-stage1-cache}
      ARTIFACT_STAGE2_CACHE_DIR: ${ARTIFACT_STAGE2_CACHE_DIR:-/data/hermes-stage2-cache}
      ARTIFACT_STAGE3_CACHE_DIR: ${ARTIFACT_STAGE3_CACHE_DIR:-/data/hermes-stage3-cache}
      ARTIFACT_STAGE4_CACHE_DIR: ${ARTIFACT_STAGE4_CACHE_DIR:-/data/hermes-stage4-cache}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Hermes image cache mount (dev parity with production docker-compose.yml).
      HERMES_IMAGE_CACHE_MOUNT: ${HERMES_IMAGE_CACHE_MOUNT:-/hermes-media}
    volumes:
      - ./:/app
      - ${ARIES_SHARED_DATA_ROOT:-/home/node/data}:/data
      - ${HERMES_IMAGE_CACHE_DIR:-/home/node/.hermes/cache/images}:/hermes-media:ro
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
