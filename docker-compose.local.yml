services:
  aries-app:
    # This block is a local-only override for the main aries-app service.
    # It does NOT create a second instance; Compose merges these fields into
    # the base aries-app definition from docker-compose.yml. Keep local URL
    # defaults here, while the production port publish stays in the base file
    # so deploys work even when only docker-compose.yml is used.
    environment:
      PORT: ${PORT:-3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:3456}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
      LOBSTER_MEDIA_GATEWAY_ENABLED: ${LOBSTER_MEDIA_GATEWAY_ENABLED:-}
      LOBSTER_MEDIA_GATEWAY_ALLOW_DIRECT_FALLBACK: ${LOBSTER_MEDIA_GATEWAY_ALLOW_DIRECT_FALLBACK:-}
      LOBSTER_MEDIA_GATEWAY_SHARED_ROOTS: ${LOBSTER_MEDIA_GATEWAY_SHARED_ROOTS:-}
      LOBSTER_MEDIA_GATEWAY_ALLOWED_HOSTS: ${LOBSTER_MEDIA_GATEWAY_ALLOWED_HOSTS:-}
      LOBSTER_MEDIA_GATEWAY_TIMEOUT_SECONDS: ${LOBSTER_MEDIA_GATEWAY_TIMEOUT_SECONDS:-}
      LOBSTER_GATEWAY_IMAGE_MODEL: ${LOBSTER_GATEWAY_IMAGE_MODEL:-}
      OPENCLAW_IMAGE_GENERATION_MODEL: ${OPENCLAW_IMAGE_GENERATION_MODEL:-}
      LOBSTER_VIDEO_RENDER_ENABLED: ${LOBSTER_VIDEO_RENDER_ENABLED:-}
      LOBSTER_VIDEO_PARALLELISM: ${LOBSTER_VIDEO_PARALLELISM:-1}
      LOBSTER_VIDEO_MAX_ATTEMPTS: ${LOBSTER_VIDEO_MAX_ATTEMPTS:-3}
      LOBSTER_GATEWAY_VIDEO_MODEL: ${LOBSTER_GATEWAY_VIDEO_MODEL:-}
      OPENCLAW_VIDEO_GENERATION_MODEL: ${OPENCLAW_VIDEO_GENERATION_MODEL:-}
      LOBSTER_VIDEO_GATEWAY_TIMEOUT_SECONDS: ${LOBSTER_VIDEO_GATEWAY_TIMEOUT_SECONDS:-}

  aries-app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      NODE_ENV: development
      HOME: /home/node
      PORT: ${PORT:-3000}
      CODE_ROOT: /app
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID}
      META_PAGE_ID: ${META_PAGE_ID}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      X_CLIENT_ID: ${X_CLIENT_ID}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:3456}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
      LOBSTER_MEDIA_GATEWAY_ENABLED: ${LOBSTER_MEDIA_GATEWAY_ENABLED:-}
      LOBSTER_MEDIA_GATEWAY_ALLOW_DIRECT_FALLBACK: ${LOBSTER_MEDIA_GATEWAY_ALLOW_DIRECT_FALLBACK:-}
      LOBSTER_MEDIA_GATEWAY_SHARED_ROOTS: ${LOBSTER_MEDIA_GATEWAY_SHARED_ROOTS:-}
      LOBSTER_MEDIA_GATEWAY_ALLOWED_HOSTS: ${LOBSTER_MEDIA_GATEWAY_ALLOWED_HOSTS:-}
      LOBSTER_MEDIA_GATEWAY_TIMEOUT_SECONDS: ${LOBSTER_MEDIA_GATEWAY_TIMEOUT_SECONDS:-}
      LOBSTER_GATEWAY_IMAGE_MODEL: ${LOBSTER_GATEWAY_IMAGE_MODEL:-}
      OPENCLAW_IMAGE_GENERATION_MODEL: ${OPENCLAW_IMAGE_GENERATION_MODEL:-}
      LOBSTER_VIDEO_RENDER_ENABLED: ${LOBSTER_VIDEO_RENDER_ENABLED:-}
      LOBSTER_VIDEO_PARALLELISM: ${LOBSTER_VIDEO_PARALLELISM:-1}
      LOBSTER_VIDEO_MAX_ATTEMPTS: ${LOBSTER_VIDEO_MAX_ATTEMPTS:-3}
      LOBSTER_GATEWAY_VIDEO_MODEL: ${LOBSTER_GATEWAY_VIDEO_MODEL:-}
      OPENCLAW_VIDEO_GENERATION_MODEL: ${OPENCLAW_VIDEO_GENERATION_MODEL:-}
      LOBSTER_VIDEO_GATEWAY_TIMEOUT_SECONDS: ${LOBSTER_VIDEO_GATEWAY_TIMEOUT_SECONDS:-}
      OPENCLAW_LOBSTER_CWD: ${OPENCLAW_LOBSTER_CWD:-/app/lobster}
      OPENCLAW_GATEWAY_LOBSTER_CWD: ${OPENCLAW_GATEWAY_LOBSTER_CWD:-aries-app/lobster}
      OPENCLAW_LOCAL_LOBSTER_CWD: ${OPENCLAW_LOCAL_LOBSTER_CWD:-/app/lobster}
      # Lobster stage cache dirs must resolve to the same absolute paths on the
      # host (where OpenClaw/Lobster writes) and in the container (where Aries
      # reads). The /data bind mount above shares ${ARIES_SHARED_DATA_ROOT} with
      # the host, so as long as the host operator exports matching
      # LOBSTER_STAGE{N}_CACHE_DIR values pointing at
      # ${ARIES_SHARED_DATA_ROOT}/lobster-stage{N}-cache before starting
      # OpenClaw, both sides see the same files. See DOCKER.md.
      LOBSTER_STAGE1_CACHE_DIR: ${LOBSTER_STAGE1_CACHE_DIR:-/data/lobster-stage1-cache}
      LOBSTER_STAGE2_CACHE_DIR: ${LOBSTER_STAGE2_CACHE_DIR:-/data/lobster-stage2-cache}
      LOBSTER_STAGE3_CACHE_DIR: ${LOBSTER_STAGE3_CACHE_DIR:-/data/lobster-stage3-cache}
      LOBSTER_STAGE4_CACHE_DIR: ${LOBSTER_STAGE4_CACHE_DIR:-/data/lobster-stage4-cache}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - ./:/app
      - ${ARIES_SHARED_DATA_ROOT:-/home/node/data}:/data
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
