services:
  aries-app:
    ports:
      - "3000:3000"
    environment:
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  aries-app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3000
      CODE_ROOT: /app
      DATA_ROOT: /data
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      OPENCLAW_SESSION_KEY: ${OPENCLAW_SESSION_KEY:-main}
      OPENCLAW_LOBSTER_CWD: ${OPENCLAW_LOBSTER_CWD:-/app/lobster}
      OPENCLAW_GATEWAY_LOBSTER_CWD: ${OPENCLAW_GATEWAY_LOBSTER_CWD:-/app/lobster}
      OPENCLAW_LOCAL_LOBSTER_CWD: ${OPENCLAW_LOCAL_LOBSTER_CWD:-/app/lobster}
    volumes:
      - ./:/app
      - aries_runtime_data:/data
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
